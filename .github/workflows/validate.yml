name: Validate repository

on:
  pull_request:
  push:
    branches: [main]

jobs:
  repository-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Validate canonical knowledge graph
        run: python scripts/research_landscape.py validate
      - name: Run automation regression tests
        run: python -m unittest discover -s scripts/tests
      - name: Verify generated views and health report
        run: python scripts/research_landscape.py generate --check
      - name: Verify generated recommendations
        run: python scripts/research_landscape.py recommend --check
      - name: Validate JSON Schema syntax
        run: node --input-type=module -e "import { readdir, readFile } from 'node:fs/promises'; for (const file of await readdir('schemas')) if (file.endsWith('.json')) JSON.parse(await readFile('schemas/' + file, 'utf8'));"
