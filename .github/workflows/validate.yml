name: Validate repository

on:
  pull_request:
  push:
    branches: [main]

jobs:
  placeholder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Confirm Markdown files are present
        run: test -n "$(find . -name '*.md' -not -path './.git/*' -print -quit)"
